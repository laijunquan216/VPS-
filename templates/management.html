{% extends 'base.html' %}
{% set active = 'management' %}
{% set title = '面板管理' %}
{% block content %}
<section class="panel">
  <h2>数据备份与恢复</h2>
  <div class="button-row">
    <a class="button-link" href="{{ url_for('download_backup') }}">下载数据备份</a>
  </div>
  <form method="post" action="{{ url_for('restore_backup') }}" enctype="multipart/form-data" class="grid-form">
    <label class="full">选择备份文件（.json）
      <input type="file" name="backup_file" accept=".json,application/json" required />
    </label>
    <button type="submit" onclick="return confirm('恢复会覆盖当前所有数据，确认继续？')">恢复备份</button>
  </form>

  <hr style="margin:16px 0;border:none;border-top:1px solid #e5e7eb;" />
  <h3>定期备份邮件</h3>
  <form method="post" action="{{ url_for('update_backup_email_settings') }}" class="grid-form">
    <label class="inline"><input name="backup_email_enabled" type="checkbox" {% if global_cfg and global_cfg.backup_email_enabled %}checked{% endif %}/> 启用定期备份邮件</label>
    <label>接收邮箱
      <input name="backup_email_to" placeholder="默认使用邮件设置中的收件人" value="{{ global_cfg.backup_email_to if global_cfg else '' }}" />
    </label>
    <label>发送间隔（天）
      <input name="backup_interval_days" type="number" min="1" max="365" value="{{ (global_cfg.backup_interval_days if global_cfg else 7) or 7 }}" required />
    </label>
    <button type="submit">保存定期备份配置</button>
  </form>
  <p class="hint">启用后系统会按天数周期自动生成 JSON 备份并以附件发送到指定邮箱（需先配置SMTP）。</p>
</section>

<section class="panel">
  <h2>登录密码管理</h2>
  <form method="post" action="{{ url_for('change_panel_password') }}" class="grid-form">
    <label>当前密码
      <input type="password" name="current_password" required />
    </label>
    <label>新密码
      <input type="password" name="new_password" minlength="4" required />
    </label>
    <label>确认新密码
      <input type="password" name="confirm_password" minlength="4" required />
    </label>
    <button type="submit">修改登录密码</button>
  </form>
</section>
{% endblock %}
